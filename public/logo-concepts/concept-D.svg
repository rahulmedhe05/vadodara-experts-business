<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <!-- Concept D: Clean Wordmark with Vadodara Arch Gate motif -->
  <defs>
    <linearGradient id="archGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#065f46"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>

  <rect width="400" height="200" rx="12" fill="#f8fafc"/>
  <text x="200" y="192" text-anchor="middle" font-family="Arial" font-size="10" fill="#94a3b8">Option D — Emerald Modern (Sayaji vibes)</text>

  <!-- Stylized arch / gate icon (nod to Vadodara's Sayaji Bagh) -->
  <rect x="55" y="80" width="15" height="40" rx="3" fill="url(#archGrad)"/>
  <rect x="110" y="80" width="15" height="40" rx="3" fill="url(#archGrad)"/>
  <path d="M 55 82 Q 90 40 125 82" fill="url(#archGrad)"/>
  <rect x="62" y="90" width="52" height="30" rx="2" fill="#065f46"/>
  <rect x="72" y="90" width="13" height="20" rx="2" fill="#f8fafc"/>
  <rect x="92" y="90" width="13" height="20" rx="2" fill="#f8fafc"/>

  <!-- Star above arch -->
  <text x="90" y="65" text-anchor="middle" font-size="14" fill="#fbbf24">★</text>

  <!-- Wordmark -->
  <text x="155" y="68" font-family="Georgia,serif" font-weight="700" font-size="30" fill="#065f46">Vadodara</text>
  <rect x="155" y="74" width="215" height="2" rx="1" fill="url(#goldLine)"/>
  <text x="155" y="98" font-family="Georgia,serif" font-weight="400" font-size="22" fill="#047857" letter-spacing="6">EXPERTS</text>
  <text x="155" y="118" font-family="Arial" font-size="9" fill="#6b7280" letter-spacing="2">PREMIUM SERVICES IN VADODARA</text>
</svg>
