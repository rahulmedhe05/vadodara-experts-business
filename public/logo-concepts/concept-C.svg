<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <!-- Concept C: Hexagon Badge — Tech/Modern Expert Feel -->
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>

  <rect width="400" height="200" rx="12" fill="#f8fafc"/>
  <text x="200" y="192" text-anchor="middle" font-family="Arial" font-size="10" fill="#94a3b8">Option C — Hexagon Badge</text>

  <!-- Hexagon -->
  <polygon points="90,28 118,44 118,76 90,92 62,76 62,44" fill="url(#hexGrad)"/>
  <polygon points="90,33 113,47 113,73 90,87 67,73 67,47" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
  <!-- VE text -->
  <text x="90" y="69" text-anchor="middle" font-family="Arial Black" font-weight="900" font-size="22" fill="#ffffff">VE</text>

  <!-- Star dots (expertise indicator) -->
  <circle cx="75" cy="25" r="3" fill="#fbbf24"/>
  <circle cx="90" cy="18" r="3" fill="#fbbf24"/>
  <circle cx="105" cy="25" r="3" fill="#fbbf24"/>

  <!-- Wordmark -->
  <text x="138" y="58" font-family="'Trebuchet MS',sans-serif" font-weight="700" font-size="27" fill="#1e1b4b">Vadodara</text>
  <text x="138" y="84" font-family="'Trebuchet MS',sans-serif" font-weight="400" font-size="21" fill="#4f46e5" letter-spacing="5">EXPERTS</text>
  <rect x="138" y="89" width="220" height="2" rx="1" fill="url(#accentGrad)"/>
  <text x="138" y="106" font-family="Arial" font-size="9" fill="#6b7280" letter-spacing="2">TRUSTED · CERTIFIED · LOCAL</text>
</svg>
