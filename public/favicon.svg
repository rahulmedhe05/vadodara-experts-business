<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>
  <!-- Hexagon -->
  <polygon points="16,1 29,8.5 29,23.5 16,31 3,23.5 3,8.5" fill="url(#hexGrad)"/>
  <!-- Inner hex border accent -->
  <polygon points="16,3.5 27,9.75 27,22.25 16,28.5 5,22.25 5,9.75" fill="none" stroke="url(#cyanGrad)" stroke-width="1"/>
  <!-- VE text -->
  <text x="16" y="21" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="11" fill="#ffffff" letter-spacing="-0.5">VE</text>
</svg>
